<h2>Book Cabin</h2>

Patient ID <input id="pid"><br>
Cabin ID <input id="cid"><br>
Start Date <input id="s"><br>
End Date <input id="e"><br>

<button onclick="bookCabin()">Book</button>

<script>

function bookCabin(){

let url="http://localhost:8008/cabins/book?"+
"patientId="+pid.value+
"&cabinId="+cid.value+
"&start="+s.value+
"&end="+e.value;

fetch(url,{method:"POST"})
.then(r=>r.json())
.then(d=>alert(JSON.stringify(d)))

}

</script>
